name: 自动部署到阿里云

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, docker]
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: 安装依赖
        run: |
          npm install
          
      - name: 构建站点
        run: |
          npm run docs:build
          
      - name: 复制文件到网站目录
        run: |
          cp -r docs/.vitepress/dist/* /www/wwwroot/myblog/